name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - Dockerfile
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

env:
  IMAGE_NAME: mdeous/plasmid

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      packages: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log into GitHub container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: mdeous
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get plasmid version
        id: get_version
        run: |
          version=""
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            version="nightly"
          else
            version="$(make version)"
          fi
          echo "Version: ${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          install: true

      - name: Pull latest image
        run: docker pull ghcr.io/${IMAGE_NAME}:latest
        continue-on-error: true

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          pull: true
          push: false
          cache-from: ghcr.io/${{ env.IMAGE_NAME }}:latest
          tags: ${{ env.IMAGE_NAME }}:ci
          outputs: type=docker,dest=/tmp/image.tar
          build-args: "VERSION=${{ steps.get_version.outputs.version }}"

      - name: Upload image archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: plasmid-image
          path: /tmp/image.tar

  publish:
    name: Publish
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    strategy:
      matrix:
        registry:
          - ghcr.io
          - docker.io
        include:
          - registry: ghcr.io
            secret: GITHUB_TOKEN
          - registry: docker.io
            secret: DOCKER_TOKEN

    steps:
      - name: Download image archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: plasmid-image
          path: /tmp/

      - name: Import image
        run: docker load --input /tmp/image.tar

      - name: Log into Docker registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ matrix.registry }}
          username: mdeous
          password: ${{ secrets[matrix.secret] }}

      - name: Get image version
        id: get_version
        run: |
          version=""
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            version="latest"
          else
            version="${GITHUB_REF##*/}"
          fi
          echo "Image version: ${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Tag image
        run: docker tag ${IMAGE_NAME}:ci ${{ matrix.registry }}/${IMAGE_NAME}:${IMAGE_VERSION}
        env:
          IMAGE_VERSION: ${{ steps.get_version.outputs.version }}

      - name: Tag latest image
        if: steps.get_version.outputs.version != 'latest'
        run: docker tag ${IMAGE_NAME}:ci ${{ matrix.registry }}/${IMAGE_NAME}:latest

      - name: Push image to container registry
        run: docker push ${{ matrix.registry }}/${IMAGE_NAME}:${IMAGE_VERSION}
        env:
          IMAGE_VERSION: ${{ steps.get_version.outputs.version }}

      - name: Push latest image to container registry
        if: steps.get_version.outputs.version != 'latest'
        run: docker push ${{ matrix.registry }}/${IMAGE_NAME}:latest
