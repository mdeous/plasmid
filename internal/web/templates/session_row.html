{{define "session_row"}}
<tr id="session-{{.ID}}">
    <td class="session-id"><span class="mono-short" title="{{.ID}}">{{.ShortID}}</span></td>
    <td>{{.UserName}}</td>
    <td>{{.NameID}}</td>
    <td>{{.CreateTime}}</td>
    <td>{{if .Expired}}<span class="badge badge-red">Expired</span> {{end}}{{.ExpireTime}}</td>
    <td>
        <button class="secondary outline" hx-delete="/ui/sessions/{{.ID}}" hx-target="#session-{{.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this session?">Delete</button>
    </td>
</tr>
{{end}}
