{{define "stats"}}
<article class="stat-card">
    <h2>{{.UserCount}}</h2>
    <small>Users</small>
</article>
<article class="stat-card">
    <h2>{{.ServiceCount}}</h2>
    <small>Service Providers</small>
</article>
<article class="stat-card">
    <h2>{{.SessionCount}}</h2>
    <small>Active Sessions</small>
</article>
<article class="stat-card">
    <h2>{{.ShortcutCount}}</h2>
    <small>Login Shortcuts</small>
</article>
{{end}}
