<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Plasmid IdP</title>
    <link rel="stylesheet" href="/ui/static/pico.min.css">
    <style>
        :root { --pico-background-color: #0d1117; --pico-color: #e6edf3; --pico-form-element-background-color: #0d1117; --pico-form-element-border-color: #30363d; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d1117; }
        main { width: 100%; max-width: 400px; padding: 2rem; }
        h1 { text-align: center; font-size: 1.6rem; margin-bottom: 1.5rem; color: #e6edf3; }
        .toast { padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; background: #641220; color: #ffc2c2; border: 1px solid #a4161a; }
        .sp-context { margin-bottom: 1rem; font-size: 0.85rem; color: #8b949e; text-align: center; }
        .sp-context code { background: #161b22; padding: 0.1rem 0.35rem; border-radius: 3px; color: #e6edf3; word-break: break-all; }
        button, input { padding: 0.5rem 0.75rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <main>
        <h1>Plasmid IdP</h1>
        {{if .Toast}}<div class="toast">{{.Toast}}</div>{{end}}
        {{with samlRequestIssuer .SAMLRequest}}<p class="sp-context">Signing in to <code>{{.}}</code></p>{{end}}
        <form method="post" action="{{.URL}}">
            <label>Username
                <input type="text" name="user" placeholder="Username" required autofocus>
            </label>
            <label>Password
                <input type="password" name="password" placeholder="Password" required>
            </label>
            <input type="hidden" name="SAMLRequest" value="{{.SAMLRequest}}">
            <input type="hidden" name="RelayState" value="{{.RelayState}}">
            <button type="submit">Log In</button>
        </form>
    </main>
</body>
</html>
