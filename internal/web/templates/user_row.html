{{define "user_row"}}
<tr id="user-{{.Name}}">
    <td>{{.Name}}</td>
    <td class="password-cell">
        <code class="password-value" data-password="{{.Password}}">••••••••</code>
        <button type="button" class="copy-btn" onclick="togglePassword(this)">Show</button>
        <button type="button" class="copy-btn" onclick="copyPassword(this)">Copy</button>
    </td>
    <td>{{.Email}}</td>
    <td>{{.GivenName}} {{.Surname}}</td>
    <td>{{range $i, $g := .Groups}}{{if $i}}, {{end}}{{$g}}{{end}}</td>
    <td>
        <button class="secondary outline" hx-post="/ui/users/{{.Name}}/password" hx-prompt="New password for {{.Name}}" hx-target="#user-{{.Name}}" hx-swap="outerHTML">Reset Password</button>
        <button class="secondary outline" hx-delete="/ui/users/{{.Name}}" hx-target="#user-{{.Name}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete user {{.Name}}?">Delete</button>
    </td>
</tr>
{{end}}
